name: amma_food_city
description: Amma Food City — Asian Grocery E-commerce App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # ── Design ───────────────────────────────────────────────────────
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # ── State Management ─────────────────────────────────────────────
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # ── Navigation ───────────────────────────────────────────────────
  go_router: ^15.1.2
  
  # ── Firebase ─────────────────────────────────────────────────────
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  firebase_messaging: ^16.1.3
  cloud_functions: ^6.1.0
  
  # ── Payments ─────────────────────────────────────────────────────
  flutter_stripe: ^11.5.0
  
  # ── Utilities ────────────────────────────────────────────────────
  shared_preferences: ^2.2.2
  connectivity_plus: ^7.0.0
  lottie: ^3.1.0
  intl: ^0.20.2
  equatable: ^2.0.5
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1

  google_maps_flutter: ^2.10.1
  url_launcher: ^6.3.1
  flutter_local_notifications: ^19.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  riverpod_generator: ^2.3.9
  riverpod_lint: ^2.3.7
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/icon/

  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700

    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
