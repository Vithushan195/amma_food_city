# Run: flutter pub run flutter_native_splash:create
# This generates a native splash screen (shown before Flutter engine loads).

flutter_native_splash:
  color: "#0B3B2D"
  
  # Optional: use an image instead of just color
  # image: assets/splash/splash_logo.png
  
  android: true
  ios: true
  
  # Android 12+ splash screen
  android_12:
    color: "#0B3B2D"
    # icon_background_color: "#0B3B2D"
    # image: assets/splash/splash_icon.png
  
  # Keep splash until app is ready
  # Call FlutterNativeSplash.remove() in main.dart after initialization
  # fullscreen: true
